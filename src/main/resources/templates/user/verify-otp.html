<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout}">

<head>
    <title>Xác thực OTP</title>
</head>

<body>
    <section layout:fragment="content" class="container mt-4">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card border-0 shadow-sm rounded-4">
                    <div class="card-body p-4">
                        <h4 class="fw-bold mb-3">Xác thực OTP</h4>
                        <p class="text-muted">Nhập mã OTP đã được gửi vào email của bạn để hoàn tất việc đổi điểm.</p>

                        <form th:action="@{/user/verify-otp}" method="post">
                            <input type="hidden" name="tokenId" th:value="${tokenId}" />
                            <div class="mb-3">
                                <input type="text" name="code" class="form-control" placeholder="Nhập mã OTP" required
                                    maxlength="6">
                            </div>
                            <div class="d-flex gap-2">
                                <button type="submit" class="btn btn-primary">Xác nhận</button>
                                <a href="/user/points" class="btn btn-outline-secondary">Hủy</a>
                            </div>
                        </form>

                        <small class="text-muted d-block mt-3">Mã có hiệu lực 10 phút. Nếu không nhận được email, kiểm tra thư mục spam.</small>
                    </div>
                </div>
            </div>
        </div>
    </section>
</body>

</html>
