<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{layout}">

<head>
    <title>Điểm tích lũy của tôi</title>
</head>

<body>
    <section layout:fragment="content" class="container mt-4">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">
                <div class="card border-0 shadow-sm rounded-4">
                    <div class="card-body p-4">
                        <h4 class="fw-bold mb-3 text-warning">
                            <i class="bi bi-stars me-2"></i>Điểm tích lũy của bạn
                        </h4>
                        <p class="text-muted mb-2">Điểm khả dụng hiện tại</p>
                        <div class="display-5 fw-bold text-dark mb-3" th:text="${availablePoints}">0</div>

                        <div class="alert alert-info mb-4">
                            10 điểm = giảm 10.000đ phí vận chuyển cho đơn hàng kế tiếp.
                        </div>

                        <div class="mb-3">
                            <label class="form-label small">Đổi điểm lấy voucher</label>
                            <div class="d-grid gap-2">
                                <!-- Voucher options: 2000, 20000, 50000, 100000 -->
                                <form th:action="@{/user/redeem}" method="post" th:if="${availablePoints} >= ${1}">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                                    <button type="submit" name="amount" value="2000" class="btn btn-outline-dark w-100 text-start">
                                        Voucher 2.000đ — Yêu cầu <span th:text="${2000/2000}">1</span> điểm
                                    </button>
                                </form>
                                <form th:action="@{/user/redeem}" method="post">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                                    <button type="submit" name="amount" value="20000" class="btn btn-outline-dark w-100 text-start"
                                        th:disabled="${availablePoints} < ${20000/2000}">
                                        Voucher 20.000đ — Yêu cầu <span th:text="${20000/2000}">10</span> điểm
                                    </button>
                                </form>
                                <form th:action="@{/user/redeem}" method="post">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                                    <button type="submit" name="amount" value="50000" class="btn btn-outline-dark w-100 text-start"
                                        th:disabled="${availablePoints} < ${50000/2000}">
                                        Voucher 50.000đ — Yêu cầu <span th:text="${50000/2000}">25</span> điểm
                                    </button>
                                </form>
                                <form th:action="@{/user/redeem}" method="post">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                                    <button type="submit" name="amount" value="100000" class="btn btn-outline-dark w-100 text-start"
                                        th:disabled="${availablePoints} < ${100000/2000}">
                                        Voucher 100.000đ — Yêu cầu <span th:text="${100000/2000}">50</span> điểm
                                    </button>
                                </form>
                            </div>
                        </div>
                        <a href="/products" class="btn btn-link w-100 mt-2 text-decoration-none">
                            Tiếp tục xem sản phẩm
                        </a>

                        <a href="/products" class="btn btn-link w-100 mt-2 text-decoration-none">
                            Tiếp tục xem sản phẩm
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </section>
</body>

</html>
