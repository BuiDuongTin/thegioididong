<!DOCTYPE html>

<head>

                    <div class="card-body p-4 text-center">

                        </div>
                        <h4 class="fw-bold mb-2">Bạn không có quyền truy cập</h4>

                            Tài khoản hiện tại không được phép truy cập trang này.
                        </p>
                        <div class="d-grid gap-2">
                            <a href="/products" class="btn btn-primary">Quay về trang sản phẩm</a>
                            <a href="/login" class="btn btn-outline-secondary">Đăng nhập bằng tài khoản khác</a>

                    </div>
                </div>
            </div>
