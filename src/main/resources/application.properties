spring.application.name=buiduongtin
server.port=8080

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/WebBanHangKtra?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# File Upload Configuration
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# Thymeleaf Cache (Disable for development)
spring.thymeleaf.cache=false

# REST Debugging
logging.level.org.springframework.web=DEBUG

# SMTP email configuration (Gmail example)
# Do NOT commit passwords to source control. Set app password as an environment variable on your machine.
# Provided SMTP user (from your input):
# Set the password locally before running (PowerShell example):
#   $env:SPRING_MAIL_PASSWORD = '<your-app-password>'
# (Replace <your-app-password> with the Gmail App Password you generated.)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=
# Password must come from env var for security. Do NOT store the raw password in this file.
spring.mail.password=
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# From address (optional)
app.mail.from=

# OTP settings
app.otp.expire-minutes=10
